name: Publish installer release

# Manual-only. Promotes the *exact* MSI bytes from a vetted CI run to a GitHub
# release (assets never expire), rather than rebuilding. Run it from the Actions
# tab once a build's artifact has been tested good.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: CI run id whose bundle-windows artifact to publish
        required: true
      tag:
        description: 'Blank = testing pre-release (auto: windows-testing-YYYY.MM.DD-<catala-sha>). Real release: pass v<opam-version>, e.g. v1.2.1 (validated against the bundled version)'
        required: false
      prerelease:
        description: Mark as pre-release (soft release, not flagged "Latest")
        type: boolean
        default: true
      draft:
        description: Create as a draft (maintainer-only until published)
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release
      actions: read     # read the artifact from the other run
    steps:
      - name: Download the vetted artifact (exact bytes, no rebuild)
        uses: actions/download-artifact@v4
        with:
          name: bundle-windows
          path: out
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show what will be published
        run: ls -l out

      - name: Create the release with the MSI + checksum
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # version + catala-sha from the MSI name (catala-<ver>-windows-x86_64-<sha>[-unsigned].msi)
          MSI=$(basename "$(ls out/catala-*.msi | head -1)")
          VER=${MSI#catala-}; VER=${VER%%-windows-x86_64-*}
          SHA=${MSI##*-x86_64-}; SHA=${SHA%-unsigned.msi}; SHA=${SHA%.msi}
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="windows-testing-$(date -u +%Y.%m.%d)-$SHA"
          else
            case "$TAG" in
              v*)
                # real release: tag version must match the bundle
                if [ "${TAG#v}" != "$VER" ]; then
                  echo "::error::release tag $TAG does not match bundled catala version $VER (from $MSI)"
                  exit 1
                fi ;;
            esac
          fi
          echo "Publishing tag: $TAG  (bundled catala $VER, sha $SHA)"
          flags=""
          [ "${{ inputs.prerelease }}" = "true" ] && flags="$flags --prerelease"
          [ "${{ inputs.draft }}" = "true" ] && flags="$flags --draft"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            $flags \
            --title "Catala Windows installer — $TAG" \
            --notes "Windows alpha installer, promoted from CI run ${{ inputs.run_id }}. Exact component SHAs are in \`manifest.json\` inside the install." \
            out/catala-*.msi out/catala-*.msi.sha256
